<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contratempo - Jogo com temática simples">
    <title>contratempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Mini Menu Flutuante (canto superior esquerdo) -->
    <button id="mini-menu-btn" class="mini-menu-btn" aria-label="Abrir upgrades">☰</button>

    <!-- Tela Principal -->
    <main class="main-screen">
        <div class="hero-content">
            <h1 class="main-title">ContraTempo</h1>
            <p class="subtitle">jogo com temática simples.</p>
            
            <div class="points-display">
                <span id="pontos-display" class="points-value">0.0</span>
                <span class="points-label">pontos</span>
            </div>
            
            <div class="rate-display">
                <span id="gps-display" class="rate-value">0.1</span>
                <span class="rate-label">/s</span>
            </div>
        </div>
    </main>

    <!-- Sidebar de Upgrades -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">Upgrades</h2>
            <button id="close-sidebar" class="close-btn" aria-label="Fechar">✕</button>
        </div>
        
        <div class="upgrades-container" id="upgrades-container">
            <!-- Upgrades gerados dinamicamente -->
        </div>

        <div class="sidebar-footer">
            <div class="footer-stat">
                <span class="footer-label">Total Ganho Offline</span>
                <span id="offline-gain" class="footer-value">0.0</span>
            </div>
            <div class="footer-stat">
                <span class="footer-label">Total de Upgrades</span>
                <span id="total-upgrades" class="footer-value">0</span>
            </div>
        </div>
    </nav>

    <!-- Modal de Ganho Offline -->
    <div id="offline-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">Você estava fora!</h2>
            <p id="offline-text" class="modal-text"></p>
            <button id="close-offline" class="btn-close">Entendido</button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Indicador de Save -->
    <div id="save-icon" class="save-icon">💾</div>

    <script src="game.js"></script>
</body>
</html>
